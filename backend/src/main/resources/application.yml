server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
    vision-model: ${GEMINI_VISION_MODEL:gemini-2.5-flash-lite}
    fallback-models: ${GEMINI_FALLBACK_MODELS:gemini-2.5-flash}
    max-retries: ${GEMINI_MAX_RETRIES:2}
    retry-delay-ms: ${GEMINI_RETRY_DELAY_MS:10000}
  pdf:
    min-text-length: 100
    max-pages-for-ocr: 10
